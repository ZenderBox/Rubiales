<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>Miramar · Ideas y recordatorios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --zb-cyan: #029ECB;
      --zb-cyan-dark: #007B9F;
      --zb-cyan-soft: rgba(2,158,203,.12);
      --zb-lime: #CCD32A;
      --ink-900: #0F0F0F;
      --ink-700: #2A2A2A;
      --ink-500: #555555;
      --ink-300: #8A8A8A;
      --ink-100: #DBDBDB;
      --ink-50: #F4F6F8;
      --paper: #FFFFFF;
      --danger: #C81E2A;
      --success: #007830;
      --warn: #B5870C;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-pill: 99px;
      --shadow-card: 0 2px 8px rgba(15,15,15,.06);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--ink-50);
      color: var(--ink-900);
      font-size: 18px;
      line-height: 1.5;
    }
    .top-bar {
      background: var(--paper); border-bottom: 1px solid var(--ink-100);
      padding: 14px 20px; position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 14px;
    }
    .back-link {
      color: var(--zb-cyan-dark); text-decoration: none; font-weight: 700;
      font-size: 15px; padding: 8px 12px; border-radius: var(--radius-md);
    }
    .back-link:hover { background: var(--zb-cyan-soft); }
    .top-title { font-weight: 800; font-size: 17px; color: var(--ink-700); flex: 1; }

    .container { max-width: 820px; margin: 0 auto; padding: 24px 20px 80px; }

    h1 { font-size: 30px; font-weight: 800; margin: 0 0 6px; }
    .subtitle { color: var(--ink-500); font-size: 16px; margin: 0 0 24px; }

    .new-idea-card {
      background: var(--paper);
      border: 2px dashed var(--zb-cyan);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 24px;
    }
    .new-idea-card h2 {
      margin: 0 0 16px;
      font-size: 19px;
      font-weight: 800;
      color: var(--zb-cyan-dark);
    }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-700);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-row input[type=text], .form-row textarea, .form-row select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--ink-100);
      border-radius: var(--radius-md);
      font-size: 18px;
      font-family: inherit;
      background: var(--ink-50);
      color: var(--ink-900);
    }
    .form-row input[type=text]:focus, .form-row textarea:focus, .form-row select:focus {
      outline: none;
      border-color: var(--zb-cyan);
      background: var(--paper);
    }
    .form-row textarea { min-height: 90px; resize: vertical; }
    .form-row input[type=file] { width: 100%; padding: 10px; font-size: 16px; }
    .btn-submit {
      background: var(--zb-cyan);
      color: var(--paper);
      border: none;
      padding: 16px 28px;
      border-radius: var(--radius-md);
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      min-height: 56px;
    }
    .btn-submit:hover { background: var(--zb-cyan-dark); }
    .btn-submit:disabled { background: var(--ink-300); cursor: wait; }

    .feedback {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 700;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.success { background: #E6F3EC; color: var(--success); }
    .feedback.error { background: #FAE6E8; color: var(--danger); }

    .ideas-section { margin-top: 32px; }
    .ideas-section h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-500);
      margin: 0 0 14px;
      font-weight: 700;
    }
    .idea {
      background: var(--paper);
      border: 1px solid var(--ink-100);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
      transition: box-shadow .15s ease;
    }
    .idea.expanded { box-shadow: 0 4px 16px rgba(15,15,15,.08); }
    .idea-summary {
      cursor: pointer;
      user-select: none;
    }
    .idea-head {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .idea-cat {
      font-size: 11px;
      font-weight: 700;
      background: var(--zb-cyan-soft);
      color: var(--zb-cyan-dark);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      text-transform: uppercase;
    }
    .idea-date { font-size: 12px; color: var(--ink-500); }
    .idea-by { font-size: 12px; color: var(--ink-500); margin-left: auto; }
    .idea-meta-cmt {
      font-size: 11px;
      font-weight: 700;
      background: var(--ink-50);
      color: var(--ink-700);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
    }
    .idea-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .idea-body {
      font-size: 15px;
      color: var(--ink-700);
      white-space: pre-wrap;
    }
    .idea-photo {
      margin-top: 10px;
      max-width: 100%;
      border-radius: var(--radius-md);
      max-height: 280px;
      display: block;
    }
    .idea-chevron {
      font-size: 13px;
      color: var(--zb-cyan-dark);
      margin-top: 10px;
      font-weight: 700;
    }

    /* Detalle expandido */
    .idea-detail {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--ink-100);
      display: none;
    }
    .idea.expanded .idea-detail { display: block; }

    .timeline-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-500);
      margin: 8px 0 10px;
    }
    .comment {
      background: var(--ink-50);
      border-left: 3px solid var(--zb-cyan);
      padding: 10px 14px;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      margin-bottom: 8px;
    }
    .comment-meta {
      font-size: 11px;
      color: var(--ink-500);
      margin-bottom: 4px;
    }
    .comment-body {
      font-size: 14px;
      color: var(--ink-700);
      white-space: pre-wrap;
    }
    .comment-photo {
      margin-top: 8px;
      max-width: 100%;
      border-radius: 8px;
      max-height: 220px;
      display: block;
    }
    .no-comments {
      font-size: 13px;
      color: var(--ink-500);
      font-style: italic;
      padding: 6px 0 14px;
    }

    .add-comment {
      margin-top: 14px;
      padding: 14px;
      background: var(--ink-50);
      border-radius: var(--radius-md);
    }
    .add-comment textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--ink-100);
      border-radius: var(--radius-md);
      font-size: 16px;
      font-family: inherit;
      background: var(--paper);
      min-height: 70px;
      resize: vertical;
    }
    .add-comment .row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .add-comment input[type=file] { flex: 1; min-width: 0; font-size: 14px; }
    .btn-small {
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-small.primary { background: var(--zb-cyan); color: var(--paper); }
    .btn-small.primary:hover { background: var(--zb-cyan-dark); }
    .btn-small.secondary { background: var(--paper); color: var(--ink-700); border: 1px solid var(--ink-100); }
    .btn-small.success { background: var(--success); color: var(--paper); }
    .btn-small.gray { background: var(--ink-50); color: var(--ink-500); border: 1px solid var(--ink-100); }

    .idea-actions-bar {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .edit-form { display: none; margin-top: 14px; padding: 14px; background: var(--warn) 10; background: #FCF3E0; border-radius: var(--radius-md); }
    .edit-form.show { display: block; }
    .edit-form input[type=text], .edit-form textarea, .edit-form select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--ink-100);
      border-radius: var(--radius-md);
      font-size: 16px;
      font-family: inherit;
      background: var(--paper);
      margin-bottom: 8px;
    }
    .edit-form textarea { min-height: 70px; resize: vertical; }

    .empty { text-align: center; color: var(--ink-500); padding: 40px 20px; font-size: 15px; }
    .loading { text-align: center; padding: 30px; color: var(--ink-500); }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="/" class="back-link">← Inicio</a>
    <div class="top-title">💡 Ideas y recordatorios</div>
  </div>

  <div class="container">
    <h1>💡 Ideas y recordatorios</h1>
    <p class="subtitle">Apuntá cualquier cosa. Después se le pueden ir agregando comentarios y fotos cuando se te ocurra algo más. Como un cuaderno que se acuerda de todo.</p>

    <div class="new-idea-card">
      <h2>✏️ Nueva nota</h2>
      <form id="ideaForm">
        <div class="form-row">
          <label for="title">¿De qué se trata?</label>
          <input type="text" id="title" name="title" placeholder="Ej: Viaje a la finca el sábado" required maxlength="200" />
        </div>
        <div class="form-row">
          <label for="body">Detalle (opcional)</label>
          <textarea id="body" name="body" placeholder="Lo que quieras agregar..."></textarea>
        </div>
        <div class="form-row">
          <label for="category">Categoría</label>
          <select id="category" name="category">
            <option value="general">General</option>
            <option value="viaje">Viaje a la finca</option>
            <option value="idea">Idea / oportunidad</option>
            <option value="recordatorio">Recordatorio</option>
            <option value="pendiente">Pendiente</option>
            <option value="contacto">Contacto importante</option>
            <option value="gasto">Gasto / compra</option>
          </select>
        </div>
        <div class="form-row">
          <label for="photo">📷 Foto (opcional)</label>
          <input type="file" id="photo" name="photo" accept="image/*" capture="environment" />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">💾 Guardar nota</button>
        <div class="feedback" id="feedback"></div>
      </form>
    </div>

    <div class="ideas-section">
      <h2 id="listTitle">Notas guardadas</h2>
      <div id="ideasList"><div class="loading">Cargando…</div></div>
    </div>
  </div>

  <script>
    const TOKEN = new URLSearchParams(location.search).get('k') || '';
    const tokenSuffix = TOKEN ? '?k=' + encodeURIComponent(TOKEN) : '';

    const CAT_LABELS = {
      general: 'General', viaje: 'Viaje', idea: 'Idea',
      recordatorio: 'Recordatorio', pendiente: 'Pendiente',
      contacto: 'Contacto', gasto: 'Gasto',
    };

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }
    function esc(s) {
      return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }
    function showFeedback(msg, kind) {
      const fb = document.getElementById('feedback');
      fb.className = 'feedback show ' + kind;
      fb.textContent = msg;
      setTimeout(() => { fb.classList.remove('show'); }, 4000);
    }

    // Cache de comentarios por idea_id
    const commentCache = {};

    async function loadIdeas() {
      const list = document.getElementById('ideasList');
      try {
        const res = await fetch('/api/ideas?status=open&t=' + Date.now());
        if (!res.ok) throw new Error();
        const data = await res.json();
        const ideas = data.ideas || [];
        document.getElementById('listTitle').textContent =
          `Notas guardadas (${ideas.length})`;
        if (ideas.length === 0) {
          list.innerHTML = '<div class="empty">Todavía no hay notas. Escribí la primera arriba ☝️</div>';
          return;
        }
        list.innerHTML = ideas.map(renderIdea).join('');
        attachIdeaHandlers();
      } catch (err) {
        list.innerHTML = '<div class="empty">No pude cargar las notas. Probá recargar.</div>';
      }
    }

    function renderIdea(i) {
      return `
        <article class="idea" data-id="${i.id}"
                 data-title="${esc(i.title)}"
                 data-body="${esc(i.body || '')}"
                 data-category="${esc(i.category || 'general')}">
          <div class="idea-summary" data-act="toggle">
            <div class="idea-head">
              <span class="idea-cat">${CAT_LABELS[i.category] || i.category}</span>
              <span class="idea-date">${fmtDate(i.created_at)}</span>
              <span class="idea-by">${esc(i.submitter || 'papá')}</span>
            </div>
            <div class="idea-title">${esc(i.title)}</div>
            ${i.body ? `<div class="idea-body">${esc(i.body)}</div>` : ''}
            ${i.photo_path ? `<img class="idea-photo" src="${i.photo_path}${tokenSuffix}" alt="foto" />` : ''}
            <div class="idea-chevron">👇 Click para ver más / agregar comentario</div>
          </div>

          <div class="idea-detail">
            <div class="timeline-title">📜 Historial</div>
            <div class="comments-list" data-comments></div>

            <div class="add-comment">
              <div class="timeline-title">➕ Agregar comentario o foto</div>
              <textarea data-cmt-body placeholder="Lo que se te ocurra ahora..."></textarea>
              <div class="row">
                <input type="file" data-cmt-photo accept="image/*" capture="environment" />
                <button class="btn-small primary" data-act="add-comment">💾 Agregar</button>
              </div>
            </div>

            <div class="idea-actions-bar">
              <button class="btn-small secondary" data-act="edit">✏️ Editar nota</button>
              <button class="btn-small success" data-act="done">✓ Marcar hecho</button>
              <button class="btn-small gray" data-act="archived">🗄️ Archivar</button>
            </div>

            <form class="edit-form" data-edit-form>
              <div class="timeline-title">Editar nota</div>
              <input type="text" data-edit-title required maxlength="200" />
              <textarea data-edit-body placeholder="Detalle..."></textarea>
              <select data-edit-category>
                <option value="general">General</option>
                <option value="viaje">Viaje a la finca</option>
                <option value="idea">Idea / oportunidad</option>
                <option value="recordatorio">Recordatorio</option>
                <option value="pendiente">Pendiente</option>
                <option value="contacto">Contacto importante</option>
                <option value="gasto">Gasto / compra</option>
              </select>
              <div class="row">
                <button type="submit" class="btn-small primary">💾 Guardar</button>
                <button type="button" class="btn-small secondary" data-act="edit-cancel">Cancelar</button>
              </div>
            </form>
          </div>
        </article>`;
    }

    function attachIdeaHandlers() {
      document.querySelectorAll('.idea').forEach(art => {
        const id = art.dataset.id;

        // Toggle expand
        art.querySelector('[data-act="toggle"]').addEventListener('click', async () => {
          const isOpen = art.classList.contains('expanded');
          if (!isOpen) {
            art.classList.add('expanded');
            await loadComments(id, art);
          } else {
            art.classList.remove('expanded');
          }
        });

        // Add comment
        art.querySelector('[data-act="add-comment"]').addEventListener('click', async () => {
          const bodyEl = art.querySelector('[data-cmt-body]');
          const photoEl = art.querySelector('[data-cmt-photo]');
          const body = bodyEl.value.trim();
          if (!body && !photoEl.files.length) return;
          const fd = new FormData();
          if (body) fd.append('body', body);
          if (photoEl.files[0]) fd.append('photo', photoEl.files[0]);
          fd.append('submitter', 'papa');
          const btn = art.querySelector('[data-act="add-comment"]');
          btn.disabled = true;
          btn.textContent = 'Guardando...';
          try {
            const res = await fetch(`/api/ideas/${id}/comments`, { method: 'POST', body: fd });
            if (!res.ok) throw new Error();
            bodyEl.value = '';
            photoEl.value = '';
            await loadComments(id, art, true);
          } catch {
            alert('No se pudo agregar el comentario');
          } finally {
            btn.disabled = false;
            btn.textContent = '💾 Agregar';
          }
        });

        // Done / archive
        art.querySelectorAll('[data-act="done"], [data-act="archived"]').forEach(b => {
          b.addEventListener('click', async () => {
            const fd = new FormData();
            fd.append('status', b.dataset.act);
            await fetch(`/api/ideas/${id}`, { method: 'PATCH', body: fd });
            art.style.opacity = '0';
            art.style.transition = 'opacity .3s';
            setTimeout(loadIdeas, 350);
          });
        });

        // Edit toggle
        art.querySelector('[data-act="edit"]').addEventListener('click', () => {
          const form = art.querySelector('[data-edit-form]');
          form.classList.add('show');
          form.querySelector('[data-edit-title]').value = art.dataset.title;
          form.querySelector('[data-edit-body]').value = art.dataset.body;
          form.querySelector('[data-edit-category]').value = art.dataset.category;
        });
        art.querySelector('[data-act="edit-cancel"]').addEventListener('click', () => {
          art.querySelector('[data-edit-form]').classList.remove('show');
        });

        // Edit submit
        art.querySelector('[data-edit-form]').addEventListener('submit', async (e) => {
          e.preventDefault();
          const title = art.querySelector('[data-edit-title]').value.trim();
          const body = art.querySelector('[data-edit-body]').value.trim();
          const cat = art.querySelector('[data-edit-category]').value;
          if (!title) return;
          const fd = new FormData();
          fd.append('title', title);
          fd.append('body', body);
          fd.append('category', cat);
          await fetch(`/api/ideas/${id}/edit`, { method: 'POST', body: fd });
          loadIdeas();
        });
      });
    }

    async function loadComments(ideaId, article, force=false) {
      const container = article.querySelector('[data-comments]');
      if (!force && commentCache[ideaId]) {
        renderComments(container, commentCache[ideaId]);
        updateCommentBadge(article, commentCache[ideaId].length);
        return;
      }
      container.innerHTML = '<div class="loading" style="padding:10px">Cargando…</div>';
      try {
        const res = await fetch(`/api/ideas/${ideaId}/comments?t=${Date.now()}`);
        const data = await res.json();
        commentCache[ideaId] = data.comments || [];
        renderComments(container, commentCache[ideaId]);
        updateCommentBadge(article, commentCache[ideaId].length);
      } catch {
        container.innerHTML = '<div class="no-comments">No se pudieron cargar los comentarios.</div>';
      }
    }

    function renderComments(container, comments) {
      if (!comments.length) {
        container.innerHTML = '<div class="no-comments">Sin comentarios aún. Agregá el primero abajo ↓</div>';
        return;
      }
      container.innerHTML = comments.map(c => `
        <div class="comment">
          <div class="comment-meta">${esc(c.submitter || 'papá')} · ${fmtDate(c.created_at)}</div>
          ${c.body ? `<div class="comment-body">${esc(c.body)}</div>` : ''}
          ${c.photo_path ? `<img class="comment-photo" src="${c.photo_path}${tokenSuffix}" alt="foto" />` : ''}
        </div>
      `).join('');
    }

    function updateCommentBadge(article, count) {
      let badge = article.querySelector('.idea-meta-cmt');
      const head = article.querySelector('.idea-head');
      if (count > 0) {
        if (!badge) {
          badge = document.createElement('span');
          badge.className = 'idea-meta-cmt';
          head.appendChild(badge);
        }
        badge.textContent = `💬 ${count}`;
      } else if (badge) {
        badge.remove();
      }
    }

    document.getElementById('ideaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const title = document.getElementById('title').value.trim();
      if (!title) {
        showFeedback('Escribí algo en "¿De qué se trata?"', 'error');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Guardando…';
      const fd = new FormData(e.target);
      fd.append('submitter', 'papa');
      try {
        const res = await fetch('/api/ideas', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'error');
        showFeedback('✓ Guardado', 'success');
        e.target.reset();
        loadIdeas();
      } catch (err) {
        showFeedback('No se pudo guardar. Probá de nuevo.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 Guardar nota';
      }
    });

    loadIdeas();
  </script>
  <script src="/sidebar-mobile.js" defer></script>
</body>
</html>
