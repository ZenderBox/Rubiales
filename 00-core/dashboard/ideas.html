<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
  <title>Miramar · Ideas y recordatorios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --zb-cyan: #029ECB;
      --zb-cyan-dark: #007B9F;
      --zb-cyan-soft: rgba(2,158,203,.12);
      --zb-lime: #CCD32A;
      --ink-900: #0F0F0F;
      --ink-700: #2A2A2A;
      --ink-500: #555555;
      --ink-300: #8A8A8A;
      --ink-100: #DBDBDB;
      --ink-50: #F4F6F8;
      --paper: #FFFFFF;
      --danger: #C81E2A;
      --success: #007830;
      --warn: #B5870C;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-pill: 99px;
      --shadow-card: 0 2px 8px rgba(15,15,15,.06);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--ink-50);
      color: var(--ink-900);
      font-size: 18px;
      line-height: 1.5;
    }
    .top-bar {
      background: var(--paper); border-bottom: 1px solid var(--ink-100);
      padding: 14px 20px; position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 14px;
    }
    .back-link {
      color: var(--zb-cyan-dark); text-decoration: none; font-weight: 700;
      font-size: 15px; padding: 8px 12px; border-radius: var(--radius-md);
    }
    .back-link:hover { background: var(--zb-cyan-soft); }
    .top-title { font-weight: 800; font-size: 17px; color: var(--ink-700); flex: 1; }

    .container { max-width: 800px; margin: 0 auto; padding: 24px 20px 80px; }

    h1 { font-size: 30px; font-weight: 800; margin: 0 0 6px; }
    .subtitle { color: var(--ink-500); font-size: 16px; margin: 0 0 24px; }

    /* Form para nueva idea */
    .new-idea-card {
      background: var(--paper);
      border: 2px dashed var(--zb-cyan);
      border-radius: var(--radius-lg);
      padding: 22px;
      margin-bottom: 24px;
    }
    .new-idea-card h2 {
      margin: 0 0 16px;
      font-size: 19px;
      font-weight: 800;
      color: var(--zb-cyan-dark);
    }
    .form-row { margin-bottom: 14px; }
    .form-row label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--ink-700);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-row input[type=text], .form-row textarea, .form-row select {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--ink-100);
      border-radius: var(--radius-md);
      font-size: 18px;
      font-family: inherit;
      background: var(--ink-50);
      color: var(--ink-900);
    }
    .form-row input[type=text]:focus, .form-row textarea:focus, .form-row select:focus {
      outline: none;
      border-color: var(--zb-cyan);
      background: var(--paper);
    }
    .form-row textarea { min-height: 100px; resize: vertical; }
    .form-row input[type=file] {
      width: 100%;
      padding: 10px;
      font-size: 16px;
    }
    .btn-submit {
      background: var(--zb-cyan);
      color: var(--paper);
      border: none;
      padding: 16px 28px;
      border-radius: var(--radius-md);
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      min-height: 56px;
    }
    .btn-submit:hover { background: var(--zb-cyan-dark); }
    .btn-submit:disabled { background: var(--ink-300); cursor: wait; }

    .feedback {
      margin-top: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 700;
      display: none;
    }
    .feedback.show { display: block; }
    .feedback.success { background: #E6F3EC; color: var(--success); }
    .feedback.error { background: #FAE6E8; color: var(--danger); }

    /* Lista ideas */
    .ideas-section { margin-top: 32px; }
    .ideas-section h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-500);
      margin: 0 0 14px;
      font-weight: 700;
    }
    .idea {
      background: var(--paper);
      border: 1px solid var(--ink-100);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
    }
    .idea-head {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .idea-cat {
      font-size: 11px;
      font-weight: 700;
      background: var(--zb-cyan-soft);
      color: var(--zb-cyan-dark);
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      text-transform: uppercase;
    }
    .idea-date {
      font-size: 12px;
      color: var(--ink-500);
    }
    .idea-by {
      font-size: 12px;
      color: var(--ink-500);
      margin-left: auto;
    }
    .idea-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .idea-body {
      font-size: 15px;
      color: var(--ink-700);
      white-space: pre-wrap;
    }
    .idea-photo {
      margin-top: 10px;
      max-width: 100%;
      border-radius: var(--radius-md);
      max-height: 280px;
      display: block;
    }
    .idea-actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
    }
    .btn-action {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--ink-100);
      border-radius: var(--radius-md);
      background: var(--paper);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-action.done { color: var(--success); border-color: var(--success); }
    .btn-action.archive { color: var(--ink-500); }

    .empty {
      text-align: center;
      color: var(--ink-500);
      padding: 40px 20px;
      font-size: 15px;
    }

    .loading { text-align: center; padding: 30px; color: var(--ink-500); }
  </style>
</head>
<body>
  <div class="top-bar">
    <a href="/" class="back-link">← Inicio</a>
    <div class="top-title">💡 Ideas y recordatorios</div>
  </div>

  <div class="container">
    <h1>💡 Ideas y recordatorios</h1>
    <p class="subtitle">Apuntá acá cualquier cosa: viajes, ideas, pendientes, recordatorios. Lo que sea. Se guarda solo.</p>

    <div class="new-idea-card">
      <h2>✏️ Nueva nota</h2>
      <form id="ideaForm">
        <div class="form-row">
          <label for="title">¿De qué se trata?</label>
          <input type="text" id="title" name="title" placeholder="Ej: Viaje a la finca el sábado" required maxlength="200" />
        </div>
        <div class="form-row">
          <label for="body">Detalle (opcional)</label>
          <textarea id="body" name="body" placeholder="Lo que quieras agregar..."></textarea>
        </div>
        <div class="form-row">
          <label for="category">Categoría</label>
          <select id="category" name="category">
            <option value="general">General</option>
            <option value="viaje">Viaje a la finca</option>
            <option value="idea">Idea / oportunidad</option>
            <option value="recordatorio">Recordatorio</option>
            <option value="pendiente">Pendiente</option>
            <option value="contacto">Contacto importante</option>
            <option value="gasto">Gasto / compra</option>
          </select>
        </div>
        <div class="form-row">
          <label for="photo">📷 Foto (opcional)</label>
          <input type="file" id="photo" name="photo" accept="image/*" capture="environment" />
        </div>
        <button type="submit" class="btn-submit" id="submitBtn">💾 Guardar nota</button>
        <div class="feedback" id="feedback"></div>
      </form>
    </div>

    <div class="ideas-section">
      <h2 id="listTitle">Notas guardadas</h2>
      <div id="ideasList"><div class="loading">Cargando…</div></div>
    </div>
  </div>

  <script>
    const TOKEN = new URLSearchParams(location.search).get('k') || '';
    const tokenSuffix = TOKEN ? '?k=' + encodeURIComponent(TOKEN) : '';

    const CAT_LABELS = {
      general: 'General',
      viaje: 'Viaje',
      idea: 'Idea',
      recordatorio: 'Recordatorio',
      pendiente: 'Pendiente',
      contacto: 'Contacto',
      gasto: 'Gasto',
    };

    function fmtDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function showFeedback(msg, kind) {
      const fb = document.getElementById('feedback');
      fb.className = 'feedback show ' + kind;
      fb.textContent = msg;
      setTimeout(() => { fb.classList.remove('show'); }, 4000);
    }

    async function loadIdeas() {
      const list = document.getElementById('ideasList');
      try {
        const res = await fetch('/api/ideas?status=open&t=' + Date.now());
        if (!res.ok) throw new Error();
        const data = await res.json();
        const ideas = data.ideas || [];
        document.getElementById('listTitle').textContent =
          `Notas guardadas (${ideas.length})`;
        if (ideas.length === 0) {
          list.innerHTML = '<div class="empty">Todavía no hay notas. Escribí la primera arriba ☝️</div>';
          return;
        }
        list.innerHTML = ideas.map(i => `
          <article class="idea" data-id="${i.id}">
            <div class="idea-head">
              <span class="idea-cat">${CAT_LABELS[i.category] || i.category}</span>
              <span class="idea-date">${fmtDate(i.created_at)}</span>
              <span class="idea-by">${i.submitter || 'papá'}</span>
            </div>
            <div class="idea-title">${escapeHtml(i.title)}</div>
            ${i.body ? `<div class="idea-body">${escapeHtml(i.body)}</div>` : ''}
            ${i.photo_path ? `<img class="idea-photo" src="${i.photo_path}${tokenSuffix}" alt="foto" />` : ''}
            <div class="idea-actions">
              <button class="btn-action done" data-act="done">✓ Hecho</button>
              <button class="btn-action archive" data-act="archived">🗄️ Archivar</button>
            </div>
          </article>
        `).join('');

        // Click handlers
        list.querySelectorAll('.btn-action').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const article = e.target.closest('.idea');
            const id = article.dataset.id;
            const act = e.target.dataset.act;
            btn.disabled = true;
            try {
              const fd = new FormData();
              fd.append('status', act);
              await fetch(`/api/ideas/${id}`, { method: 'PATCH', body: fd });
              article.style.opacity = '0';
              article.style.transition = 'opacity .3s';
              setTimeout(loadIdeas, 350);
            } catch {
              btn.disabled = false;
            }
          });
        });
      } catch (err) {
        list.innerHTML = '<div class="empty">No pude cargar las notas. Probá recargar.</div>';
      }
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    }

    document.getElementById('ideaForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const title = document.getElementById('title').value.trim();
      if (!title) {
        showFeedback('Escribí algo en "¿De qué se trata?"', 'error');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Guardando…';
      const fd = new FormData(e.target);
      fd.append('submitter', 'papa');
      try {
        const res = await fetch('/api/ideas', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'error');
        showFeedback('✓ Guardado', 'success');
        e.target.reset();
        loadIdeas();
      } catch (err) {
        showFeedback('No se pudo guardar. Probá de nuevo.', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = '💾 Guardar nota';
      }
    });

    loadIdeas();
  </script>
</body>
</html>
